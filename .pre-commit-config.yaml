repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        exclude: ^manifests/
      - id: check-added-large-files
      - id: check-json
      - id: check-toml
      - id: check-merge-conflict
      - id: detect-private-key

  - repo: https://github.com/dnephin/pre-commit-golang
    rev: v0.5.1
    hooks:
      - id: go-fmt
      # go-vet is included in golangci-lint, so we skip it here to avoid conflicts
      - id: go-mod-tidy
      - id: go-unit-tests
        args: [-race]

  - repo: local
    hooks:
      - id: golangci-lint
        name: golangci-lint
        entry: bash -c 'golangci-lint run --timeout=4m --config=.golangci.yaml'
        language: system
        pass_filenames: false
